@if (derivedSearchResult$ | async) {
  <ds-listable-object-component-loader
    [viewMode]="ViewModes.GridElement"
    [object]="derivedSearchResult$ | async"
    [linkType]="LinkTypes.None"
    [context]="badgeContext"
    [showLabel]="showLabel"
    [showMetrics]="false"
    [showThumbnails]="showThumbnails"
    [showWorkflowStatistics]="showWorkflowStatistics"></ds-listable-object-component-loader>

  <div class="mt-1 text-center">
    <ds-workspace-item-admin-workflow-actions-element [wsi]="dso" [small]="true"></ds-workspace-item-admin-workflow-actions-element>
  </div>
}

@if ((derivedSearchResult$ | async) === undefined) {
  <ds-loading [showMessage]="false"></ds-loading>
}
