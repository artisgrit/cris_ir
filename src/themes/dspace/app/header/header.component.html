<div class="header-topbar" aria-label="Quick links and social links">
  <div class="container-fluid px-3">
    <div class="topbar-content">
      <div class="topbar-icons" aria-label="Social links">
        <a class="topbar-icon d-none d-sm-inline-flex" href="https://www.facebook.com/UCULibrary/" target="_blank" rel="noopener" aria-label="Facebook">
          <span class="fa-brands fa-facebook-f" aria-hidden="true"></span>
        </a>
        <a class="topbar-icon d-none d-sm-inline-flex" href="https://x.com/UcuLibrary" target="_blank" rel="noopener" aria-label="X">
          <span class="fa-brands fa-x-twitter" aria-hidden="true"></span>
        </a>
        <a class="topbar-icon d-none d-sm-inline-flex" href="https://www.youtube.com/@HamumukasaLibrary" target="_blank" rel="noopener" aria-label="YouTube">
          <span class="fa-brands fa-youtube" aria-hidden="true"></span>
        </a>
        <a class="topbar-icon d-none d-sm-inline-flex" href="https://www.linkedin.com/in/uganda-christian-university-a-centre-of-excellence-in-the-heart-of-africa-53797118a/" target="_blank" rel="noopener" aria-label="LinkedIn">
          <span class="fa-brands fa-linkedin-in" aria-hidden="true"></span>
        </a>
        <a class="topbar-icon d-none d-sm-inline-flex" href="https://t.me/uculib" target="_blank" rel="noopener" aria-label="Telegram">
          <span class="fa-brands fa-telegram" aria-hidden="true"></span>
        </a>
        <a class="topbar-icon" href="https://ucu.ac.ug" target="_blank" rel="noopener" aria-label="UCU main website">
          <span class="fa-solid fa-globe" aria-hidden="true"></span>
        </a>
      </div>
    </div>
  </div>
</div>

<header id="main-site-header">
  <div class="container-fluid h-100 d-flex flex-row align-items-center justify-content-between gapx-2 gapy-2 px-3" id="main-site-header-container">
    <div id="header-left"
      class="h-100 d-flex flex-row flex-nowrap justify-content-start align-items-center">
      <a class="d-block my-2 my-md-0" routerLink="/home" [attr.aria-label]="'home.title' | translate" role="button" tabindex="0">
        <img id="header-logo" src="assets/images/lib-logo.png" alt="UCU Libraries and Archives Logo" title="UCU Libraries and Archives"/>
      </a>
    </div>

    <!-- Desktop / large screens: spread the navbar horizontally after the logo -->
    <div id="header-center" class="d-none d-md-flex flex-grow-1 align-items-center ms-3 min-w-0">
      <ds-navbar></ds-navbar>
    </div>

    <div id="header-right" class="h-100 d-flex flex-row flex-nowrap flex-shrink-0 justify-content-end align-items-center ms-auto">
      <div class="header-search me-2">
        <ds-search-navbar></ds-search-navbar>
      </div>

      <!-- Desktop only: language switcher shown between the search icon and Log In,
           matching the screenshot layout (🔍 | 🌐 | Log In).
           Context-help and impersonate remain mobile-only (inside the hamburger dropdown below). -->
      <ds-lang-switch class="d-none d-md-inline-flex"></ds-lang-switch>

      <!-- Mobile / small screens: hamburger menu -->
      <div ngbDropdown #navMenu="ngbDropdown" class="d-inline-flex d-md-none align-items-center header-nav-dropdown" placement="bottom-end" container="body" autoClose="inside">
        <button id="header-menu-toggle" class="btn btn-transparent" type="button"
          ngbDropdownToggle
          [attr.aria-label]="'nav.toggle' | translate"
          [attr.aria-expanded]="navMenu.isOpen()">
          <span class="fas fa-bars fa-fw fa-xl toggler-icon" aria-hidden="true"></span>
        </button>

        <div ngbDropdownMenu class="dropdown-menu dropdown-menu-end p-0 header-nav-dropdown-menu" aria-labelledby="header-menu-toggle">
          <div class="p-3 border-bottom header-nav-controls">
            <div role="toolbar" class="d-flex flex-row flex-wrap align-items-center justify-content-end gapx-1 mt-2" [attr.aria-label]="'nav.user.description' | translate">
              <ds-lang-switch></ds-lang-switch>
              <ds-context-help-toggle></ds-context-help-toggle>
              <ds-impersonate-navbar></ds-impersonate-navbar>
            </div>
          </div>

          <nav class="p-3 header-nav-menu" [attr.aria-label]="'nav.main.description' | translate">
            <ds-navbar></ds-navbar>
          </nav>
        </div>
      </div>

      <div class="header-auth ms-2">
        <ds-auth-nav-menu></ds-auth-nav-menu>
      </div>
    </div>
  </div>
</header>
