<div class="container w-100 h-100">
  <div class="text-center mt-3 row justify-content-center">
    @if (isPlatformBrowser) {
      <div data-test="login">
        <img class="mb-4 login-logo" src="assets/images/ucu-logo.svg" [alt]="'repository.image.logo' | translate">
        <h1 class="h3 mb-0 fw-normal">{{"login.form.header" | translate}}</h1>
        <ds-log-in
        [isStandalonePage]="true"></ds-log-in>
      </div>
    } @else {
      <ds-loading [showMessage]="false" data-test="loading"></ds-loading>
    }
  </div>
</div>
